<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAJINSU ARCHIVE</title>
  <style>
    * {
      box-sizing: border-box;
    }
 
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1220;
      color: #ffffff;
      overflow-x: hidden;   /* 가로 스크롤만 막고 세로는 허용 */
    }
 
    body {
      position: relative;
      z-index: 0;
    }
 
    /* 배경 이미지 레이어 */
    body::before {
      content: "";
      position: fixed;
      inset: -4%;
      background:
        linear-gradient(rgba(7, 15, 28, 0.42), rgba(7, 15, 28, 0.62)),
        url("./background.png") center center / cover no-repeat;
      filter: blur(4px); /* 배경 흐릿하게 */
      animation: bgDrift 10s ease-in-out infinite alternate; /* 24s → 10s */
      z-index: -2;
    }
 
    /* 주변광 글로우 레이어 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(92, 164, 255, 0.08), transparent 22%),
        radial-gradient(circle at 78% 32%, rgba(91, 203, 255, 0.05), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(130, 110, 255, 0.05), transparent 26%);
      filter: blur(24px);
      animation: ambientGlow 8s ease-in-out infinite alternate; /* 18s → 8s */
      z-index: -1;
      pointer-events: none;
    }
 
    @keyframes bgDrift {
      0%   { transform: scale(1) translate(0px, 0px); }
      100% { transform: scale(1.03) translate(-14px, -8px); }
    }
 
    @keyframes ambientGlow {
      0%   { transform: translate(0px, 0px); opacity: 0.8; }
      100% { transform: translate(-18px, 12px); opacity: 1; }
    }
 
    /* 콘텐츠 레이어 */
    .topbar,
    .shell {
      position: relative;
      z-index: 1;
    }
 
    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      gap: 34px;
      padding: 0 42px;
      background: linear-gradient(to bottom, rgba(8, 14, 25, 0.92), rgba(8, 14, 25, 0.65));
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
    }
 
    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #f4f7fb;
    }
 
    .brand span {
      color: #7ab8ff;
    }
 
    .nav {
      display: flex;
      gap: 24px;
      color: #b3bfd0;
      font-size: 14px;
    }
 
    .nav div {
      cursor: default;
      transition: color 0.2s ease;
    }
 
    .nav div:hover {
      color: #ffffff;
    }
 
    .shell {
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
 
    .panel {
      width: min(780px, 100%);
      padding: 36px 40px 34px;
      background: linear-gradient(
        180deg,
        rgba(17, 26, 41, 0.92) 0%,
        rgba(13, 22, 36, 0.90) 100%
      );
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }
 
    .kicker {
      font-size: 12px;
      letter-spacing: 1.6px;
      color: #7fa6d9;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
 
    .title {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #f5f8fc;
    }
 
    .content {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 34px;
      align-items: start;
    }
 
    .label {
      font-size: 12px;
      font-weight: 700;
      color: #7eb8ff;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
 
    .label.password {
      color: #c5cfdb;
    }
 
    .field {
      width: 100%;
      height: 46px;
      border: none;
      outline: none;
      background: rgba(63, 72, 86, 0.72);
      color: #ffffff;
      font-size: 17px;
      padding: 0 14px;
      margin-bottom: 16px;
      border-radius: 3px;
      transition: box-shadow 0.2s ease, background 0.2s ease;
    }
 
    .field::placeholder {
      color: #8b97a8;
    }
 
    .field.active {
      background: rgba(71, 81, 96, 0.9);
      box-shadow: 0 0 0 2px rgba(64, 154, 255, 0.9) inset;
    }
 
    .save-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cad3de;
      font-size: 14px;
      margin: 6px 0 22px;
    }
 
    .login-btn {
      width: 230px;
      height: 46px;
      border: none;
      border-radius: 3px;
      background: linear-gradient(90deg, #1fb4ef, #376df8);
      color: #ffffff;
      font-size: 18px;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 24px rgba(40, 113, 255, 0.18);
      cursor: pointer;
    }
 
    .sub-link {
      margin-top: 18px;
      font-size: 13px;
      color: #90a0b3;
    }
 
    .qr-side {
      text-align: center;
      color: #c5d1dd;
    }
 
    .qr-frame {
      width: 180px;
      height: 180px;
      margin: 0 auto 12px;
      background: #ffffff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }
 
    .qr {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      background:
        linear-gradient(45deg, #ffffff 25%, #d9d9d9 25%, #d9d9d9 50%, #ffffff 50%, #ffffff 75%, #d9d9d9 75%);
      background-size: 20px 20px;
      position: relative;
      overflow: hidden;
    }
 
    .qr::before,
    .qr::after {
      content: "";
      position: absolute;
      background: rgba(0, 0, 0, 0.12);
    }
 
    .qr::before {
      width: 100%;
      height: 2px;
      top: 50%;
      left: 0;
    }
 
    .qr::after {
      width: 2px;
      height: 100%;
      top: 0;
      left: 50%;
    }
 
    .qr-text {
      font-size: 13px;
      line-height: 1.5;
      color: #b8c6d3;
    }

    .notice {
      margin-top: 18px;
      font-size: 12px;
      color: #8695a8;
      line-height: 1.6;
    }

    /* ── 모바일 반응형 ── */
    @media (max-width: 640px) {
      .topbar {
        height: 56px;
        padding: 0 20px;
        gap: 18px;
      }

      .brand { font-size: 20px; }
      .nav   { gap: 14px; font-size: 13px; }

      .shell {
        padding: 20px 12px;
        align-items: flex-start;
      }

      .panel {
        padding: 24px 20px 22px;
      }

      .title { font-size: 30px; margin-bottom: 20px; }

      /* QR 숨기고 폼만 1열로 */
      .content {
        grid-template-columns: 1fr;
      }
      .qr-side { display: none; }

      .login-btn { width: 100%; }

      .field { font-size: 15px; height: 42px; }
    }

    @media (max-width: 400px) {
      .brand { font-size: 17px; }
      .nav   { gap: 10px; font-size: 12px; }
      .title { font-size: 26px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="library.html" class="brand">GAJINSU <span>ARCHIVE</span></a>
    <nav class="nav">
      <div>상점</div>
      <div>커뮤니티</div>
      <div>정보</div>
      <div>지원</div>
    </nav>
  </header>
 
  <main class="shell">
    <section class="panel">
      <div class="kicker">PORTFOLIO LOGIN DEMO</div>
      <div class="title">로그인</div>
 
      <div class="content">
        <div class="left">
          <div class="label">계정 이름으로 로그인</div>
          <input
            id="idField"
            class="field"
            type="text"
            readonly
            placeholder="아이디 칸을 클릭하세요"
          />
 
          <div class="label password">비밀번호</div>
          <input
            id="pwField"
            class="field"
            type="text"
            readonly
            placeholder=""
          />
 
          <label class="save-row">
            <input type="checkbox" checked />
            로그인 정보 저장
          </label>
 
         <button class="login-btn" type="button" onclick="window.location.href='library.html'">로그인</button>
          <div class="sub-link">로그인 관련 문제</div>
        </div>
 
        <div class="qr-side">
          <div class="qr-frame">
            <div class="qr"></div>
          </div>
          <div class="qr-text">
            모바일 앱을 사용하여<br />
            QR 코드로 로그인
          </div>
        </div>
      </div>
 
      <div class="notice">
        이 페이지는 포트폴리오용 데모입니다. 실제 로그인 기능은 없고, 입력 내용도 저장하거나 전송하지 않습니다.
      </div>
    </section>
  </main>
 
  <script>
    const idField = document.getElementById("idField");
    const pwField = document.getElementById("pwField");
 
    const fakeId = "gajinsu";
    const fakePwLength = 12;
 
    let activeField = null;
    let idIndex = 0;
    let pwIndex = 0;
 
    function updateActiveStyle() {
      idField.classList.remove("active");
      pwField.classList.remove("active");
 
      if (activeField === "id") {
        idField.classList.add("active");
      } else if (activeField === "pw") {
        pwField.classList.add("active");
      }
    }
 
    idField.addEventListener("click", () => {
      activeField = "id";
      if (!idField.value) {
        idField.placeholder = "";
      }
      updateActiveStyle();
    });
 
    pwField.addEventListener("click", () => {
      if (idIndex >= fakeId.length) {
        activeField = "pw";
        updateActiveStyle();
      }
    });
 
    document.addEventListener("keydown", (e) => {
      if (activeField !== "id" && activeField !== "pw") return;
 
      e.preventDefault();
 
      if (activeField === "id") {
        if (idIndex < fakeId.length) {
          idField.value += fakeId[idIndex];
          idIndex++;
        }
        if (idIndex >= fakeId.length) {
          activeField = "pw";
          updateActiveStyle();
        }
        return;
      }
 
      if (activeField === "pw") {
        if (pwIndex < fakePwLength) {
          pwField.value += "*";
          pwIndex++;
        }
        if (pwIndex >= fakePwLength) {
          activeField = "done";
          updateActiveStyle();
        }
      }
    });
  </script>
</body>
</html>
